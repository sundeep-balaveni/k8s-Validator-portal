---

apiVersion: v1
kind: Namespace
metadata:
  name: database-photoshop
  labels:
    project: roboshop
    environment: dev
    purpose: poc

---





apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs-static
  namespace: database-photoshop
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 2Gi # should be less than or equal to your disk size
  csi:
    driver: ebs.csi.aws.com
    fsType: ext4
    volumeHandle: vol-06fb032d8594e043d
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-static
  namespace: database-photoshop
spec:
  storageClassName: "" # Empty string must be explicitly set otherwise default StorageClass will be set
  volumeName: ebs-static # This is  the PV name
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
